embedding:
  model_name: "BAAI/bge-base-en-v1.5"
  dim: 768
  batch_size: 64
chunking:
  tokenizer_model: "BAAI/bge-base-en-v1.5"
  chunk_size: 400
  chunk_overlap: 100
retrieval:
  k: 5
  lambda_mult: 0.5
  score_threshold: 0.60
llm:
  model: "Qwen/Qwen2.5-14B-Instruct"
  temperature: 0.1
  num_ctx: 5120
